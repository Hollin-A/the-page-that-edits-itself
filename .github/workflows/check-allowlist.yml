name: Check allowlist

on:
  pull_request:
    branches: [main]

jobs:
  allowlist:
    name: Verify only permitted files changed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check against allowlist
        run: |
          if [[ "${{ github.head_ref }}" != agent/* ]]; then
            echo "Not an agent branch — allowlist check skipped."
            exit 0
          fi

          git fetch origin main
          CHANGED=$(git diff --name-only origin/main...HEAD)
          ALLOWLIST="content/hero.json theme/tokens.json"
          FAILED=0

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            ALLOWED=0
            for permitted in $ALLOWLIST; do
              if [ "$file" = "$permitted" ]; then
                ALLOWED=1
                break
              fi
            done
            if [ "$ALLOWED" -eq 0 ]; then
              echo "::error::Disallowed file changed: $file"
              FAILED=1
            fi
          done <<< "$CHANGED"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Only the following files may be changed by agent PRs:"
            for permitted in $ALLOWLIST; do
              echo "  - $permitted"
            done
            exit 1
          fi

          echo "All changed files are within the allowlist."
